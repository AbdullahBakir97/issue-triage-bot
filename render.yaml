services:
  - type: web
    name: issue-triage-bot
    runtime: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: GITHUB_APP_ID
        sync: false
      - key: GITHUB_PRIVATE_KEY
        sync: false
      - key: GITHUB_WEBHOOK_SECRET
        sync: false
      - key: GITHUB_INSTALLATION_ID
        sync: false
      - key: LOG_LEVEL
        value: INFO
